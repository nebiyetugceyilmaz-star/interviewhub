<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>InterviewHub - Interview</title>
    <style>
      /* -------------------------------------------------------------
        InterviewHub UI Tokens (index.html ile aynı görsel dil)
      -------------------------------------------------------------- */
      :root {
        --bg0: #070a12;
        --bg1: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.08);
        --stroke: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --primary: #6d5efc;
        --primary2: #22c55e;
        --danger: #fb7185;
        --warn: #fbbf24;
        --shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(900px 600px at 20% 10%, rgba(109, 94, 252, 0.28), transparent 60%),
          radial-gradient(900px 600px at 80% 20%, rgba(34, 197, 94, 0.22), transparent 58%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
      }

      a {
        color: inherit;
      }

      /* -------------------------------------------------------------
        Layout
      -------------------------------------------------------------- */
      .page {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }

      .topBar {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .topBarInner {
        max-width: 1160px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 220px;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(109, 94, 252, 1), rgba(34, 197, 94, 0.9));
        border: 1px solid rgba(255, 255, 255, 0.22);
        position: relative;
        box-shadow: 0 18px 55px rgba(109, 94, 252, 0.18);
      }

      .logo::after {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .brandTitle {
        display: grid;
        gap: 1px;
      }

      .brandTitle strong {
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.05;
      }

      .brandTitle span {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.62);
      }

      .infoStrip {
        flex: 1;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        white-space: nowrap;
      }

      .pill .label {
        color: rgba(255, 255, 255, 0.62);
      }

      .pill svg {
        width: 14px;
        height: 14px;
        opacity: 0.92;
      }

      .topActions {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        min-width: 220px;
      }

      .btn {
        border: none;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: -0.01em;
        border-radius: 14px;
        padding: 10px 12px;
        color: #0b1220;
        background: linear-gradient(135deg, rgba(109, 94, 252, 1), rgba(34, 197, 94, 0.95));
        transition: transform 120ms ease, filter 120ms ease;
      }

      .btn:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.7;
        transform: none;
      }

      .btnGhost {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 650;
      }

      .main {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 18px 16px 22px;
      }

      .shell {
        width: 100%;
        max-width: 980px;
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(800px 250px at 20% 0%, rgba(109, 94, 252, 0.22), transparent 55%),
          radial-gradient(700px 240px at 85% 10%, rgba(34, 197, 94, 0.16), transparent 58%);
        pointer-events: none;
      }

      .cardInner {
        position: relative;
        z-index: 1;
      }

      /* -------------------------------------------------------------
        Chat UI
      -------------------------------------------------------------- */
      .chatHeader {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.03);
      }

      .chatHeaderTitle {
        display: grid;
        gap: 3px;
      }

      .chatHeaderTitle strong {
        font-size: 14px;
        letter-spacing: -0.01em;
      }

      .chatHeaderTitle span {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.60);
      }

      .stageBadge {
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.86);
        white-space: nowrap;
      }

      .chatBody {
        height: min(66vh, 560px);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 14px 14px 10px;
        scroll-behavior: smooth;
      }

      /* Scroll bar styling - webkit browsers (Chrome, Safari, Edge) */
      .chatBody::-webkit-scrollbar {
        width: 8px;
      }

      .chatBody::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 4px;
      }

      .chatBody::-webkit-scrollbar-thumb {
        background: rgba(109, 94, 252, 0.4);
        border-radius: 4px;
      }

      .chatBody::-webkit-scrollbar-thumb:hover {
        background: rgba(109, 94, 252, 0.6);
      }

      @media (max-width: 520px) {
        .chatBody {
          height: min(64vh, 540px);
        }
        
        .chatBody::-webkit-scrollbar {
          width: 6px;
        }
      }

      .msgRow {
        display: flex;
        gap: 10px;
        margin: 10px 0;
        align-items: flex-end;
      }

      .msgRow.user {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .avatar svg {
        width: 18px;
        height: 18px;
        opacity: 0.92;
      }

      .bubble {
        max-width: 78%;
        border-radius: 16px;
        padding: 12px 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
        line-height: 1.45;
        font-size: 14px;
        white-space: pre-wrap;
      }

      .msgRow.user .bubble {
        background: rgba(109, 94, 252, 0.14);
        border-color: rgba(109, 94, 252, 0.22);
      }

      .meta {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        color: rgba(255, 255, 255, 0.55);
        font-size: 11px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        font-size: 11px;
      }

      .tag.pool {
        border-color: rgba(34, 197, 94, 0.30);
        background: rgba(34, 197, 94, 0.12);
      }

      .tag.ai {
        border-color: rgba(109, 94, 252, 0.35);
        background: rgba(109, 94, 252, 0.14);
      }

      .tag.stage {
        border-color: rgba(251, 191, 36, 0.28);
        background: rgba(251, 191, 36, 0.12);
      }

      .composer {
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.03);
      }

      .composerGrid {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: end;
      }

      @media (max-width: 680px) {
        .composerGrid {
          grid-template-columns: 1fr auto;
          grid-template-areas:
            "input input"
            "finish send";
        }
        #answer {
          grid-area: input;
        }
        #finishBtn {
          grid-area: finish;
        }
        #sendBtn {
          grid-area: send;
        }
      }

      textarea {
        width: 100%;
        resize: none;
        min-height: 44px;
        max-height: 140px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        outline: none;
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 14px;
        line-height: 1.35;
      }

      textarea::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }

      .toast {
        display: none;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        line-height: 1.45;
        margin-top: 10px;
      }

      .toast.show {
        display: block;
      }

      .toast.error {
        border-color: rgba(251, 113, 133, 0.35);
        background: rgba(251, 113, 133, 0.10);
      }

      /* -------------------------------------------------------------
        Report overlay
      -------------------------------------------------------------- */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px 16px;
        background: rgba(0, 0, 0, 0.52);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .overlay.show {
        display: flex;
      }

      .report {
        width: 100%;
        max-width: 980px;
        max-height: 86vh;
        overflow: auto;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.65);
        position: relative;
      }

      .report::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: radial-gradient(900px 260px at 15% 0%, rgba(109, 94, 252, 0.28), transparent 55%),
          radial-gradient(850px 260px at 85% 10%, rgba(34, 197, 94, 0.20), transparent 58%);
        pointer-events: none;
      }

      .reportInner {
        position: relative;
        z-index: 1;
        padding: 16px;
      }

      .reportHeader {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 4px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      }

      .reportHeader h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: -0.01em;
      }

      .reportHeader p {
        margin: 6px 0 0 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.62);
        line-height: 1.4;
      }

      .reportGrid {
        display: grid;
        gap: 12px;
        padding: 14px 2px 6px;
      }

      .reportCard {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
      }

      .reportCard h3 {
        margin: 0 0 10px 0;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.88);
      }

      .list {
        margin: 0;
        padding-left: 18px;
        color: rgba(255, 255, 255, 0.80);
        line-height: 1.5;
        font-size: 13px;
      }

      .qList {
        display: grid;
        gap: 10px;
      }

      .qItem {
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 10px;
      }

      .qTop {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .qText {
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.90);
      }

      .sourceBadge {
        flex: 0 0 auto;
        font-size: 11px;
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        white-space: nowrap;
      }

      .sourceBadge.pool {
        border-color: rgba(34, 197, 94, 0.35);
        background: rgba(34, 197, 94, 0.14);
      }

      .sourceBadge.ai {
        border-color: rgba(109, 94, 252, 0.40);
        background: rgba(109, 94, 252, 0.16);
      }

      .sourceBadge.stage {
        border-color: rgba(251, 191, 36, 0.28);
        background: rgba(251, 191, 36, 0.12);
      }

      /* -------------------------------------------------------------
        Evidence tooltip (A1/A2...) - hafif CSS çözümü
      -------------------------------------------------------------- */
      .evidenceWrap {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
        align-items: center;
        margin-left: 8px;
      }

      .evidenceRef {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid rgba(109, 94, 252, 0.35);
        background: rgba(109, 94, 252, 0.14);
        color: rgba(255, 255, 255, 0.88);
        font-size: 11px;
        line-height: 1;
        cursor: help;
        user-select: none;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .evidenceRef::after {
        content: attr(data-tip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 12px);
        transform: translateX(-50%);
        width: min(520px, 70vw);
        padding: 10px 10px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .evidenceRef::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: calc(100% + 6px);
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.08);
        border-left: 1px solid rgba(255, 255, 255, 0.16);
        border-bottom: 1px solid rgba(255, 255, 255, 0.16);
        rotate: 45deg;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .evidenceRef:hover::after,
      .evidenceRef:hover::before {
        opacity: 1;
      }

      .reportActions {
        display: flex;
        gap: 10px;
        padding: 12px 2px 4px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .srOnly {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!--
        Üst bilgi çubuğu (header): Şirket / Pozisyon / Deneyim bilgileri
        Bu değerler index.html sayfasında localStorage'a yazılan "interviewhub:startPayload"tan okunur.
      -->
      <header class="topBar" aria-label="Bilgi çubuğu">
        <div class="topBarInner">
          <div class="brand" aria-label="InterviewHub">
            <div class="logo" aria-hidden="true"></div>
            <div class="brandTitle">
              <strong>InterviewHub</strong>
              <span>Interview Simulation</span>
            </div>
          </div>

          <div class="infoStrip" aria-label="Seçim bilgileri">
            <div class="pill" title="Şirket">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 20V6.8c0-.44.36-.8.8-.8H10V4.8c0-.44.36-.8.8-.8h2.4c.44 0 .8.36.8.8V6h5c.44 0 .8.36.8.8V20"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
                <path
                  d="M8 20v-4M12 20v-6M16 20v-3"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
              </svg>
              <span class="label">Şirket</span>
              <span id="companyPill">-</span>
            </div>
            <div class="pill" title="Pozisyon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M9 6V5.6c0-.88.72-1.6 1.6-1.6h2.8c.88 0 1.6.72 1.6 1.6V6"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
                <path
                  d="M5 7.6c0-.88.72-1.6 1.6-1.6h10.8c.88 0 1.6.72 1.6 1.6V20H5V7.6Z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 11h6M9 14h6"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
              </svg>
              <span class="label">Pozisyon</span>
              <span id="positionPill">-</span>
            </div>
            <div class="pill" title="Deneyim">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"
                  stroke="currentColor"
                  stroke-width="1.6"
                />
                <path
                  d="M4 20c1.6-3.6 4.4-5.4 8-5.4S18.4 16.4 20 20"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
              </svg>
              <span class="label">Deneyim</span>
              <span id="levelPill">-</span>
            </div>
          </div>

          <div class="topActions">
            <a class="btn btnGhost" href="./index.html" title="Ana sayfaya dön">Geri</a>
            <button class="btn btnGhost" id="finishTopBtn" type="button" title="Mülakatı bitir">
              Bitir
            </button>
            <span class="stageBadge" id="modeBadge" style="display:none;">AI: Online</span>
          </div>
        </div>
      </header>

      <main class="main">
        <div class="shell">
          <section class="card" aria-label="Sohbet alanı">
            <div class="cardInner">
              <div class="chatHeader">
                <div class="chatHeaderTitle">
                  <strong>AI Mülakatçı</strong>
                  <span id="subStatus">Akış hazırlanıyor…</span>
                </div>
                <div class="stageBadge" id="stageBadge">Aşama: -</div>
              </div>

              <div class="chatBody" id="chatBody" aria-label="Mesajlar"></div>

              <div class="composer">
                <div class="composerGrid">
                  <label class="srOnly" for="answer">Yanıt</label>
                  <textarea
                    id="answer"
                    placeholder="Yanıtını yaz ve Enter ile gönder (Shift+Enter: yeni satır)…"
                  ></textarea>
                  <button class="btn btnGhost" id="finishBtn" type="button">Bitir</button>
                  <button class="btn" id="sendBtn" type="button">Gönder</button>
                </div>
                <div id="toast" class="toast" role="status" aria-live="polite"></div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Analiz raporu overlay (mülakat bitince açılır) -->
    <div class="overlay" id="overlay" aria-label="Mülakat analiz raporu" role="dialog" aria-modal="true">
      <div class="report">
        <div class="reportInner">
          <div class="reportHeader">
            <div>
              <h2>Mülakat Analiz Raporu</h2>
              <p id="reportSub">Özet hazırlanıyor…</p>
            </div>
            <button class="btn btnGhost" id="closeReportBtn" type="button">Kapat</button>
          </div>

          <div class="reportGrid">
            <div class="reportCard">
              <h3>Performans Analizi</h3>
              <ul class="list" id="reportStrengths"></ul>
            </div>

            <div class="reportCard">
              <h3>Gelişim Alanları</h3>
              <ul class="list" id="reportGrowth"></ul>
            </div>

            <div class="reportCard">
              <h3>Sektörden İpuçları</h3>
              <ul class="list" id="reportIndustryTips"></ul>
            </div>

            <div class="reportCard">
              <h3>Sorular ve Kaynakları</h3>
              <div class="qList" id="reportQuestions"></div>
            </div>
          </div>

          <div class="reportActions">
            <button class="btn btnGhost" id="copyJsonBtn" type="button" title="Analizi JSON olarak kopyala">

        if (!item || typeof item !== "object") return null;

          item.soru ||
          item.soruMetni ||
          item.content ||
          "";

        const company = item.company || item.companyName || item.organization || item.firm || "";

        const level = item.level || item.experience || item.seniority || item.exp || "";
        const stage = item.stage || item.phase || item.category || "";

        const normalized = {
          question: String(question || "").trim(),
          company: String(company || "").trim(),
          position: String(position || "").trim(),
          level: String(level || "").trim(),
          stage: String(stage || "").trim(),
          raw: item,
        };

        if (!normalized.question) return null;
        return normalized;
      }

      function readCommunityPool() {
        const raw = localStorage.getItem("community_questions");
        if (!raw) return [];
        const parsed = safeJsonParse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map(normalizePoolItem).filter(Boolean);
      }

      function normalizeQuestion(text) {
        // Soruları normalize et: ÇAGIN kesin bir şekilde duplicate kontrol'ü sağla
        let normalized = String(text || "")
          .toLowerCase()
          .trim()
          // TÜM noktalama işaretleri, parantez, özel karakterler çıkar
          .replace(/[?!.,:;'"()\-\·\*\+\=\[\]\{\}\/\\]/g, "")
          // Sayıları da kaldır (örneğin "Soru 1" = "Soru")
          .replace(/\d+/g, "")
          // İkiz boşlukları temizle
          .replace(/\s+/g, " ")
          // Başında/sonunda boşluk temizle
          .trim()
          // Türkçe İngilizce ortak "stop words" kaldır
          .replace(/^(bir |the |a |an |ve |and |or |veya |bu |this |that |nedir |ne |what |how |why |which )/, "")
          .trim();
        
        // Çok kısa soruları önle (gürültü)
        if (normalized.length < 6) return null;
        
        // Çok uzun soruları kısalt
        return normalized.substring(0, 120);
      }

      function looselyIncludes(haystack, needle) {
        if (!needle) return true;
        if (!haystack) return false;
        return haystack.toLowerCase().includes(String(needle).toLowerCase());
      }

      function matchPoolItemToUser(item, payload) {
        if (!payload) return false;
        const companyOk =
          !item.company || looselyIncludes(payload.company, item.company) || looselyIncludes(item.company, payload.company);
        const positionOk =
          !item.position ||
          looselyIncludes(payload.position, item.position) ||
          looselyIncludes(item.position, payload.position);
        const levelOk = !item.level || String(item.level).toLowerCase() === String(payload.level).toLowerCase();
        return companyOk && positionOk && levelOk;
      }

      function inferStage(item) {
        const s = (item.stage || "").toLowerCase();
        if (s.includes("intro") || s.includes("tan") || s.includes("giriş") || s.includes("giris")) return "intro";
        if (s.includes("tech") || s.includes("tekn") || s.includes("role") || s.includes("pozisyon")) return "technical";
        if (s.includes("close") || s.includes("kap") || s.includes("davran") || s.includes("behavior")) return "closing";
        return "technical"; // etiket yoksa en güvenli varsayım: teknik/pozisyon
      }

      // Pool'dan aşamalara göre seçilecek soruların kuyruğu.
      const poolQueue = [];
      (function buildPoolQueue() {
        const pool = readCommunityPool();
        if (!pool.length || !startPayload) return;

        const candidates = pool.filter((it) => matchPoolItemToUser(it, startPayload));
        if (!candidates.length) return;

        // Her aşama için soruları grupla
        const byStage = { intro: [], technical: [], closing: [] };
        for (const c of candidates) byStage[inferStage(c)].push(c);

        // Shuffle function - soruları randomize etmek için
        const shuffle = (arr) => {
          const copy = [...arr];
          for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
          }
          return copy;
        };

        // Intro: maksimum 4 soru
        const introQuestions = shuffle(byStage.intro).slice(0, 4);
        for (const q of introQuestions) {
          poolQueue.push({ stage: "intro", question: q.question });
        }

        // Technical: maksimum 6 soru (en önemli aşama)
        const techQuestions = shuffle(byStage.technical).slice(0, 6);
        for (const q of techQuestions) {
          poolQueue.push({ stage: "technical", question: q.question });
        }

        // Closing: maksimum 4 soru
        const closingQuestions = shuffle(byStage.closing).slice(0, 4);
        for (const q of closingQuestions) {
          poolQueue.push({ stage: "closing", question: q.question });
        }
      })();

      async function requestGeminiWithFallback(userPrompt, generationConfig = {}, systemInstruction = null) {
        if (!API_KEY || API_KEY === "" || API_KEY.includes("BURAYA")) {
          throw new Error("API anahtarı girilmedi.");
        }

        const finalSystemInstruction = systemInstruction || SYSTEM_INSTRUCTION;

        const body = {
          contents: [
            {
              role: "user",
              parts: [
                {
                  text:
                    `[Sistem Talimatı]\n${finalSystemInstruction}\n\n` +
                    `[Kullanıcı İsteği]\n${userPrompt}`,
                },
              ],
            },
          ],
          generationConfig: {
            temperature: 0.6,
            maxOutputTokens: 500,
            ...generationConfig,
          },
        };

        let lastError = null;

        for (const model of GEMINI_MODELS) {
          // Çok sık istek atmayı engelle (429 riskini azaltır) - 429 hatalarını önlemek için artırıldı
          const now = Date.now();
          const minGapMs = 2000; // 500ms → 2000ms: API rate limit'ine daha fazla saygı göster
          const waitMs = Math.max(0, minGapMs - (now - lastGeminiCallAt));
          if (waitMs > 0) await sleep(waitMs);

          const endpoint = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${encodeURIComponent(
            API_KEY
          )}`;
          try {
            let res = null;
            // 429 için agresif retry/backoff (quota hatası için)
            for (let attempt = 0; attempt < 5; attempt += 1) {
              lastGeminiCallAt = Date.now();
              res = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
              });

              if (res.status !== 429) break;

              const retryAfter = Number(res.headers.get("retry-after") || 0);
              // Exponential backoff: 2000ms → 4000ms → 8000ms → 16000ms → 32000ms
              const backoffMs = retryAfter > 0 ? retryAfter * 1000 : Math.pow(2, attempt + 1) * 1000;
              console.warn(`429 Quota error. Retrying after ${backoffMs}ms (attempt ${attempt + 1}/5)`);
              await sleep(backoffMs);
            }

            if (!res.ok) {
              const errText = await res.text().catch(() => "");
              // 404 ise bir sonraki modele düş.
              if (res.status === 404) {
                lastError = new Error(`Model bulunamadı (${model}).`);
                continue;
              }
              if (res.status === 429) {
                lastError = new Error("Quota dolu veya çok sık istek atıldı (429). 1-2 dakika sonra tekrar dene.");
                continue;
              }
              throw new Error(`HTTP Hata: ${res.status}${errText ? ` - ${errText}` : ""}`);
            }

            const data = await res.json();
            const text =
              data?.candidates?.[0]?.content?.parts?.map((p) => p.text).filter(Boolean).join("\n") || "";
            if (!text.trim()) throw new Error("Gemini yanıtı boş döndü.");
            return text.trim();
          } catch (err) {
            lastError = err;
          }
        }

        throw lastError || new Error("Gemini isteği başarısız.");
      }

      function localFilterPoolQuestion(question) {

        return { ok: true, reason: "OK" };

          if (degradedMode) {
            // DegradedMode: Pool'dan sor VEYA yerel fallback
            const hasPoolQuestions = poolQueue.some((q) => q.stage === stageId);
            if (hasPoolQuestions) {
              const poolQuestion = nextPoolQuestionForStage(stageId);
              if (poolQuestion) {
                const filterResult = await geminiFilterPoolQuestion({
                  question: poolQuestion,
                  payload: startPayload,
                  stageId,
                });

                if (filterResult.ok) {
                  question = poolQuestion;
                  source = "Pool";
                } else {
                  // Pool soru uygunsuğuzsa yerel fallback
                  question = localQuestionFor(stageId);
                  source = "Local";
                }
              } else {
                // Pool'dan soru alınamadıysa yerel fallback
                question = localQuestionFor(stageId);
                source = "Local";
              }
            } else {
              // Pool boşsa yerel fallback
              question = localQuestionFor(stageId);
              source = "Local";
            }
          } else {
            // Normal Mode: POOL ve AI'yı KARIŞTıRAN MANTIK
            // %50 şansla pool'dan, %50 şansla AI'dan soru seç
            const usePool = Math.random() < 0.5; // %50 pool, %50 AI
            const hasPoolQuestions = poolQueue.some((q) => q.stage === stageId);
            
            // Seçenek 1: Pool'dan sor (%50 şans VE pool sorular var)
            if (usePool && hasPoolQuestions) {
              const poolQuestion = nextPoolQuestionForStage(stageId);
              if (poolQuestion) {
                // Pool sorusunu filtrele
                const filterResult = await geminiFilterPoolQuestion({
                  question: poolQuestion,
                  payload: startPayload,
                  stageId,
                });

                if (filterResult.ok) {
                  question = poolQuestion;
                  source = "Pool";
                } else {
                  // Pool soru uygunsuzsa AI'dan al
                  question = await generateUniqueAIQuestion(stageId);
                  source = "AI";
                }
              } else {
                // Pool'dan soru alınamadıysa AI'dan
                question = await generateUniqueAIQuestion(stageId);
                source = "AI";
              }
            } else {
              // Seçenek 2: AI'dan sor (%50 şans VEYA pool sorusu yok)
              question = await generateUniqueAIQuestion(stageId);
              source = "AI";
            }
          }

          // Fallback: sorusu yoksa yerel fallback soru döndür
          if (!question) {
            question = localQuestionFor(stageId);
            source = "Local";
          }

          // Soruyu kayıt altına al ve göster
          if (question) {
            const qid = `Q${asked.length + 1}`;
            lastQuestionId = qid;

            asked.push({ id: qid, text: question, stage: stageId, source: source, ts: new Date().toISOString() });
            sources.push(source);
            stageAskedCount[stageId] = (stageAskedCount[stageId] || 0) + 1;

            // Soru öncesi transition mesajı ekle (ilk soru değilse)
            if (asked.length > 1) {
              const transMsg = getRandomTransitionMessage();
              addAiMessageTyping({
                text: transMsg,
                metaTags: [],
              });
            }
            askedQuestionsCount++;

            addAiMessageTyping({
              text: question,
              idLabel: qid,
              metaTags: [
                { kind: "ai", text: qid },
                { kind: "stage", text: stageTitle(stageId) },
              ],
            });

            subStatus.textContent = "Yanıtını bekliyor…";
          } else {
            throw new Error("Soru üretilemeedi. Lütfen sayfayı yenileyip tekrar deneyin.");
          }
        } catch (err) {
          console.error("Soru üretme hatası:", err);
          showToast(String(err?.message || err), { error: true });
          subStatus.textContent = "Hata: " + (String(err?.message || "Soru alınamadı").substring(0, 40));
        } finally {
          sendBtn.disabled = false;
          finishBtn.disabled = false;
          finishTopBtn.disabled = false;
          answerEl.focus();
        }
      }

      // Yardımcı fonksiyon: Unique (tekrarlanmayan) AI sorusu üret (OPTIMIZED - hızlı)
      async function generateUniqueAIQuestion(stageId) {
        try {
          // DegradedMode'da local sorular kullan (pool'dan)
          if (degradedMode) {
            const localQ = localQuestionFor(stageId);
            return localQ;
          }
          
          const maxRetry = 3; // Duplicate kontrol için 3 deneme
          let aiQuestion = null;
          let retryCount = 0;
          
          // İlk denemesinden başlayarak, duplicate bulunca retry yap
          for (let attempt = 0; attempt <= maxRetry; attempt++) {
            aiQuestion = await geminiGenerate({ mode: "ask" });
            
            if (!aiQuestion || !aiQuestion.trim()) {
              console.warn(`🔴 AI Soru Boş (Attempt ${attempt + 1}/${maxRetry + 1})`);
              if (attempt === maxRetry) {
                return localQuestionFor(stageId);
              }
              continue;
            }
            
            const normAi = normalizeQuestion(aiQuestion);
            
            // Duplicate kontrol
            if (normAi && askedQuestionNormalized.has(normAi)) {
              console.log(`🔄 Duplicate bulundu, retry... (Attempt ${attempt + 1}/${maxRetry + 1}): "${aiQuestion.substring(0, 40)}..."`);
              if (attempt === maxRetry) {
                // Son denemeydi, fallback ver
                return localQuestionFor(stageId);
              }
              continue; // Bir sonraki attempt'e geç
            }
            
            // Unique soru bulundu!
            if (normAi) {
              askedQuestionNormalized.add(normAi);
              console.log(`✅ AI Sorusu (Attempt ${attempt + 1}): "${aiQuestion.substring(0, 50)}..."`);
            }
            
            return aiQuestion;
          }
          
          // Fallback: hiçbir şey çalışmazsa yerel soru
          return localQuestionFor(stageId);
        } catch (err) {
          console.error("❌ AI soru üretme hatası:", err);
          // Hata durumunda yerel fallback soru döndür
          return localQuestionFor(stageId);
        }
      }

      async function startInterview() {
        setStageUI();

        if (!startPayload) {
          addAiMessageTyping({
            text:
              "Seçim bilgilerini bulamadım. Lütfen önce ana sayfadan şirket, pozisyon ve deneyim seviyesini seçerek gel.",
            metaTags: [{ kind: "ai", text: "AI" }],
          });
          subStatus.textContent = "Başlatılamadı.";
          sendBtn.disabled = true;
          finishBtn.disabled = true;
          finishTopBtn.disabled = true;
          return;
        }

        try {
          // Karşılama mesajı (giriş / tanışma atmosferi)
          addAiMessageTyping({
            text:
              `Merhaba, ben InterviewHub'daki mülakatçın. ` +
              `${startPayload.company} için ${startPayload.position} (${humanizeLevel(startPayload.level)}) hazırlığı yapacağız. ` +
              `Hazırsan başlayalım.`,
            metaTags: [{ kind: "ai", text: "AI" }],
          });

          // İlk soru
          await askNextQuestion();
        } catch (err) {
          console.error("Simülasyon akışında hata:", err);
          showToast(String(err?.message || "Bir hata oluştu. Tekrar deneyin."), { error: true });
          subStatus.textContent = "Hata: Sayfayı yenileyip tekrar deneyin.";
          sendBtn.disabled = false;
          finishBtn.disabled = false;
          finishTopBtn.disabled = false;
        }
      }

      function renderReportSkeleton() {
        reportSub.textContent = `${startPayload?.company || "-"} • ${startPayload?.position || "-"} • ${humanizeLevel(
          startPayload?.level
        )}`;
        reportStrengths.innerHTML = "";
        reportGrowth.innerHTML = "";
        reportIndustryTips.innerHTML = "";
        reportQuestions.innerHTML = "";

        // Soruları report Questions bölümüne ekle - her soru ayrı card
        // (Feedback'ler daha sonra eklenecek after gemini response)
      }

      async function finishInterview() {
        if (interviewFinished) return;
        interviewFinished = true;

        sendBtn.disabled = true;
        finishBtn.disabled = true;
        finishTopBtn.disabled = true;
        answerEl.disabled = true;
        subStatus.textContent = "Rapor hazırlanıyor…";

        overlay.classList.add("show");
        renderReportSkeleton();

        try {
          // Kullanıcının dili için ipucu (son kullanıcı mesajına göre).
          const lastUser = [...transcript].reverse().find((m) => m.role === "user");
          if (lastUser?.text) lastUserLanguageHint = detectLanguageHint(lastUser.text);

          const raw = await geminiGenerate({ mode: "analyze" });
          const parsed = safeJsonParse(raw);

          const fallback = {
            strengths: [],
            growthAreas: [],
            industryTips: [],
            rawText: raw,
          };

          const analysis = parsed && typeof parsed === "object" ? parsed : fallback;

          const strengths = Array.isArray(analysis.strengths) ? analysis.strengths : [];
          const growthAreas = Array.isArray(analysis.growthAreas) ? analysis.growthAreas : [];
          const relationshipIssuesFromAnalysis = Array.isArray(analysis.relationshipIssues) ? analysis.relationshipIssues : [];
          const industryTips = Array.isArray(analysis.industryTips) ? analysis.industryTips : [];
          
          // Global relationshipIssues state'ine kaydet (rapor render'ı için)
          relationshipIssues = relationshipIssuesFromAnalysis;

          function normalizeEvidence(ev) {
            const arr = Array.isArray(ev) ? ev : [];
            return arr
              .map((x) => String(x || "").trim())
              .filter(Boolean)
              .filter((x) => /^A\d+$/i.test(x))
              .map((x) => x.toUpperCase())
              .slice(0, 6);
          }

          // ============ YENİ: HER SORU İÇİN INLINE FEEDBACK ============
          // Soruları ve feedback'lerini QuestionFeedback Container'ında göster
          
          // İlişkisiz cevapları en başta (uyarı olarak)
          if (relationshipIssuesFromAnalysis && relationshipIssuesFromAnalysis.length > 0) {
            const issueDiv = document.createElement("div");
            issueDiv.style.padding = "12px";
            issueDiv.style.marginBottom = "16px";
            issueDiv.style.backgroundColor = "#fff3e0";
            issueDiv.style.borderLeft = "3px solid #f57c00";
            issueDiv.style.borderRadius = "4px";
            issueDiv.style.fontSize = "12px";
            issueDiv.style.color = "#e65100";
            issueDiv.innerHTML = `<strong>⚠️ ${relationshipIssuesFromAnalysis.length} adet konudan bağımsız cevap tespit edildi</strong><br><span style="font-size: 11px; opacity: 0.9; display: block; margin-top: 4px;">Bu cevaplar soru temasıyla ilgisiz ve mülakat performansınızı yansıtmamaktadır.</span>`;
            reportQuestions.appendChild(issueDiv);
          }
          
          // Her soru için CARD oluştur - soru + cevap + feedback
          for (let qIdx = 0; qIdx < asked.length; qIdx++) {
            const q = asked[qIdx];
            const a = answers.find((x) => x.questionId === q.id);
            
            const card = document.createElement("div");
            card.style.padding = "14px";
            card.style.marginBottom = "12px";
            card.style.backgroundColor = "var(--card)";
            card.style.borderRadius = "6px";
            card.style.border = "1px solid var(--border)";
            
            // Soru başlığı + source badge (küçük)
            const header = document.createElement("div");
            header.style.display = "flex";
            header.style.justifyContent = "space-between";
            header.style.alignItems = "center";
            header.style.marginBottom = "8px";
            
            const qLabel = document.createElement("span");
            qLabel.style.fontWeight = "600";
            qLabel.style.fontSize = "13px";
            qLabel.textContent = `${q.id}`;
            
            const sourceBadge = document.createElement("span");
            sourceBadge.style.fontSize = "11px";
            sourceBadge.style.padding = "2px 6px";
            sourceBadge.style.borderRadius = "3px";
            sourceBadge.style.backgroundColor = q.source === "Pool" ? "rgba(76, 175, 80, 0.15)" : "rgba(109, 94, 252, 0.15)";
            sourceBadge.style.color = q.source === "Pool" ? "#2e7d32" : "#6d5efc";
            sourceBadge.textContent = q.source === "Pool" ? "📋 Havuz" : "✨ AI";
            
            header.appendChild(qLabel);
            header.appendChild(sourceBadge);
            card.appendChild(header);
            
            // Soru metni
            const qTextDiv = document.createElement("div");
            qTextDiv.style.fontSize = "13px";
            qTextDiv.style.marginBottom = "8px";
            qTextDiv.style.lineHeight = "1.5";
            qTextDiv.textContent = q.text;
            card.appendChild(qTextDiv);
            
            // Cevap (kısa)
            if (a) {
              const answerDiv = document.createElement("div");
              answerDiv.style.fontSize = "12px";
              answerDiv.style.padding = "8px 10px";
              answerDiv.style.marginBottom = "8px";
              answerDiv.style.backgroundColor = "rgba(0,0,0,0.03)";
              answerDiv.style.borderRadius = "4px";
              answerDiv.style.color = "var(--muted)";
              answerDiv.style.fontStyle = "italic";
              answerDiv.style.borderLeft = "2px solid var(--border)";
              
              const answerText = (a.text || "").trim().substring(0, 200);
              answerDiv.textContent = `"${answerText}${answerText.length > 199 ? '...' : ''}"`;
              card.appendChild(answerDiv);
            }
            
            // Feedback (strength/growth) - qIdx'e göre eşle
            const strengthForQ = strengths.find((s) => {
              const ev = s && s.evidence ? normalizeEvidence(s.evidence) : [];
              return ev.some((aid) => aid === `A${qIdx + 1}`);
            });
            
            const growthForQ = growthAreas.find((g) => {
              const ev = g && g.evidence ? normalizeEvidence(g.evidence) : [];
              return ev.some((aid) => aid === `A${qIdx + 1}`);
            });
            
            const feedbackDiv = document.createElement("div");
            feedbackDiv.style.fontSize = "12px";
            feedbackDiv.style.lineHeight = "1.6";
            
            if (strengthForQ) {
              const fb = document.createElement("div");
              fb.style.marginBottom = "6px";
              fb.style.paddingBottom = "6px";
              fb.style.borderBottom = "1px solid var(--border)";
              
              const point = document.createElement("div");
              point.style.color = "#4caf50";
              point.style.fontWeight = "600";
              point.innerHTML = `✅ <strong>${strengthForQ.point}</strong>`;
              fb.appendChild(point);
              
              if (strengthForQ.detail) {
                const detail = document.createElement("div");
                detail.style.marginTop = "4px";
                detail.style.color = "var(--muted)";
                detail.style.fontSize = "11px";
                detail.textContent = strengthForQ.detail;
                fb.appendChild(detail);
              }
              feedbackDiv.appendChild(fb);
            }
            
            if (growthForQ) {
              const fb = document.createElement("div");
              
              const point = document.createElement("div");
              point.style.color = "#ff9800";
              point.style.fontWeight = "600";
              point.innerHTML = `→ <strong>${growthForQ.point}</strong>`;
              fb.appendChild(point);
              
              if (growthForQ.detail) {
                const detail = document.createElement("div");
                detail.style.marginTop = "4px";
                detail.style.color = "var(--muted)";
                detail.style.fontSize = "11px";
                detail.textContent = growthForQ.detail;
                fb.appendChild(detail);
              }
              
              if (growthForQ.example) {
                const ex = document.createElement("div");
                ex.style.marginTop = "6px";
                ex.style.padding = "6px 8px";
                ex.style.backgroundColor = "rgba(109, 94, 252, 0.08)";
                ex.style.borderRadius = "3px";
                ex.style.color = "var(--fg)";
                ex.style.fontSize = "11px";
                ex.innerHTML = `<strong>💡 Örnek:</strong> ${growthForQ.example}`;
                fb.appendChild(ex);
              }
              feedbackDiv.appendChild(fb);
            }
            
            if (!strengthForQ && !growthForQ) {
              feedbackDiv.style.color = "var(--muted)";
              feedbackDiv.style.fontSize = "11px";
              feedbackDiv.textContent = "(Feedback bulunamadı)";
            }
            
            card.appendChild(feedbackDiv);
            reportQuestions.appendChild(card);
          }
          
          // Sektör İpuçları (ayrı bölümde göster)
          // Not: Güçlü Yönler ve Gelişim Alanları her sorunun yanında gösterilmektedir
          // (reportStrengths/reportGrowth gösterim yok - sadece her card'da inline feedback)
          
          // Sektör İpuçları (inline, her sorunun yanında görülüyor)  
          if (industryTips && industryTips.length > 0) {
            reportIndustryTips.innerHTML = industryTips.slice(0, 5).map((tip) => `<li style="font-size: 13px;">${tip}</li>`).join("");
          } else {
            reportIndustryTips.innerHTML = "<li style='opacity: 0.7; font-size: 12px;'>İpucu bulunamadı.</li>";
          }
          
          // Strengths ve Growth Areas (her sorunun yanında inline gösterildiği için bu bölümleri temizle)
          reportStrengths.innerHTML = "";
          reportGrowth.innerHTML = "";

          // Rapor JSON'unu kopyalama için sakla
          const strengthsOut = strengths
            .map((it) =>
              typeof it === "string"
                ? { point: it, detail: "", evidence: [] }
                : { 
                    point: String(it?.point || ""), 
                    detail: String(it?.detail || ""),
                    evidence: normalizeEvidence(it?.evidence) 
                  }
            )
            .filter((x) => x.point);

          const growthOut = growthAreas
            .map((it) =>
              typeof it === "string"
                ? { point: it, detail: "", example: "", evidence: [] }
                : { 
                    point: String(it?.point || ""), 
                    detail: String(it?.detail || ""),
                    example: String(it?.example || ""),
                    evidence: normalizeEvidence(it?.evidence) 
                  }
            )
            .filter((x) => x.point);

          const tipsOut = industryTips.map((x) => String(x)).filter(Boolean);

          overlay.dataset.analysisJson = JSON.stringify(
            {
              strengths: strengthsOut,
              growthAreas: growthOut,
              relationshipIssues: relationshipIssues.map((x) => ({
                answerId: String(x?.answerId || ""),
                question: String(x?.question || ""),
                issue: String(x?.issue || "")
              })),
              industryTips: tipsOut,
              questions: asked.map((q) => ({
                id: q.id || "",
                text: q.text,
                stage: q.stage,
                source: q.source,
                sourceLabel: q.source === "Pool" 
                  ? "Gerçek Mülakat Sorusu (Havuz)" 
                  : "AI Tarafından Oluşturulan Soru ✨",
              })),
              summary: {
                totalQuestions: asked.length,
                aiGeneratedCount: asked.filter((q) => q.source === "AI").length,
                poolQuestionCount: asked.filter((q) => q.source === "Pool").length,
                relationshipIssuesCount: relationshipIssues.length,
                note: "AI Tarafından Oluşturulan Sorular (✨): Bu projede yapaylı zeka tarafından dinamik olarak üretilen, eğitim amaçlı sorulardır."
              }
            },
            null,
            2
          );

          reportSub.textContent =
            (lastUserLanguageHint === "en" ? "Interview complete" : "Mülakat tamamlandı") +
            ` • ${startPayload?.company || "-"} • ${startPayload?.position || "-"}`;
        } catch (err) {
          const errMsg = String(err?.message || err);
          reportStrengths.textContent = errMsg;
          reportGrowth.textContent = lastUserLanguageHint === "en" ? "Analysis failed." : "Analiz alınamadı.";
          reportIndustryTips.textContent =
            lastUserLanguageHint === "en"
              ? "Check API key and network."
              : "API anahtarını ve bağlantıyı kontrol et.";
          showReportToast("Analiz alınamadı. API anahtarını ve bağlantıyı kontrol et.", { error: true });
        }
      }

      /* =============================================================
        11) Kullanıcı etkileşimleri (gönder, bitir, klavye kısayolları)
      ============================================================== */
      function getAnswerText() {
        return (answerEl.value || "").trim();
      }

      async function onSend() {
        // Gönderme tuşu devre dışıyken (örneğin soru hazırlanırken) Enter'a basılırsa,
        // ikinci kez soru üretmeye çalışmamak için buradan çıkarız.
        if (sendBtn.disabled) return;

        if (interviewFinished) {
          // Kullanıcı mülakat bittikten sonra tekrar yazmaya çalışırsa:
          showToast("Mülakat tamamlandı. Rapor panelini kapatıp yeni bir simülasyon başlatabilirsiniz.", {
            error: true,
          });
          return;
        }
        hideToast();

        const text = getAnswerText();
        if (!text) {
          showToast("Yanıt boş olamaz.", { error: true });
          return;
        }

        lastUserLanguageHint = detectLanguageHint(text);

        // Kullanıcı yanıtlarını A1, A2... şeklinde indeksle.
        const aid = `A${answerCounter + 1}`;
        answerCounter += 1;

        // Son soruya bağla (kanıtlı rapor için).
        const qid = lastQuestionId || asked[asked.length - 1]?.id || null;
        answers.push({ id: aid, questionId: qid, text, ts: new Date().toISOString() });

        addMessage({ role: "user", text, idLabel: aid, metaTags: [{ kind: "ai", text: aid }] });
        answerEl.value = "";

        // Kullanıcı yanıtından sonra sıradaki soruya geç.
        // (MVP) Adayın yanıtına göre "adaptif" soru üretimini Gemini zaten kendi bağlamında yapar.
        await askNextQuestion();

        // Tüm aşamalarda hedef sayılar dolduysa otomatik bitir.
        const totalTarget = STAGES.reduce((sum, s) => sum + s.targetQuestions, 0);
        if (asked.length >= totalTarget) {
          await finishInterview();
        }
      }

      /* =============================================================
        11) İsimli Olaylar (Tek Kere)
      ============================================================== */
      sendBtn.addEventListener("click", onSend);
      finishBtn.addEventListener("click", finishInterview);
      finishTopBtn.addEventListener("click", finishInterview);

      answerEl.addEventListener("keydown", (e) => {
        // Enter: gönder, Shift+Enter: yeni satır
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          onSend();
        }
      });

      if (closeReportBtn) {
        closeReportBtn.addEventListener("click", () => overlay.classList.remove("show"));
      }
      if (overlay) {
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.classList.remove("show");
        });
      }

      if (restartBtn) {
        restartBtn.addEventListener("click", () => {
          window.location.href = "./index.html";
        });
      }

      if (copyJsonBtn) {
        copyJsonBtn.addEventListener("click", async () => {
          const json = overlay.dataset.analysisJson || "";
          if (!json) {
            showReportToast("Kopyalanacak JSON yok.", { error: true });
            return;
          }
          try {
            await navigator.clipboard.writeText(json);
            showReportToast("JSON kopyalandı!", { error: false });
          } catch {
            showReportToast("Kopyalama başarısız.", { error: true });
          }
        });
      }

      /* =============================================================
        12) Mülakat Başlatma
      ============================================================== */
      // Emin ol ki DOM yüklendi
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          subStatus.textContent = "Hazırlanıyor…";
          startInterview().catch((err) => {
            console.error("Simülasyon başlatma hatası:", err);
            showToast(String(err?.message || "Simülasyon başlatılamadı. Sayfayı yenileyip tekrar deneyin."), { error: true });
            subStatus.textContent = "Hata: Sayfayı yenileyip tekrar deneyin.";
            sendBtn.disabled = false;
            if (finishBtn) finishBtn.disabled = false;
            if (finishTopBtn) finishTopBtn.disabled = false;
          });
        });
      } else {
        subStatus.textContent = "Hazırlanıyor…";
        startInterview().catch((err) => {
          console.error("Simülasyon başlatma hatası:", err);
          showToast(String(err?.message || "Simülasyon başlatılamadı. Sayfayı yenileyip tekrar deneyin."), { error: true });
          subStatus.textContent = "Hata: Sayfayı yenileyip tekrar deneyin.";
          sendBtn.disabled = false;
          if (finishBtn) finishBtn.disabled = false;
          if (finishTopBtn) finishTopBtn.disabled = false;
        });
      }
    </script>
  </body>
